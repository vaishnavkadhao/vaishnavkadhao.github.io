<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">AI lead scoring dashboard preview</title>
  <desc id="desc">Dark dashboard preview with lead scoring metrics, conversion intelligence charts, and hot warm cold lead segments.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset=".52" stop-color="#111827"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.376 0 0 0 0 0.647 0 0 0 0 0.980 0 0 0 .35 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1280" cy="160" r="260" fill="#60a5fa" opacity=".10"/>
  <circle cx="220" cy="780" r="280" fill="#a78bfa" opacity=".12"/>
  <rect x="86" y="78" width="1428" height="844" rx="42" fill="#111827" opacity=".82" stroke="#1f2937" stroke-width="3"/>
  <rect x="134" y="130" width="510" height="136" rx="24" fill="#0a0e1a" stroke="#1f2937" stroke-width="2"/>
  <text x="170" y="178" fill="#a78bfa" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="5">LIVE ML DASHBOARD</text>
  <text x="170" y="226" fill="#f3f4f6" font-family="Poppins, Arial, sans-serif" font-size="50" font-weight="700">Lead Scoring</text>
  <rect x="690" y="130" width="238" height="136" rx="24" fill="#0a0e1a" stroke="#1f2937" stroke-width="2"/>
  <text x="724" y="181" fill="#f59e0b" font-family="Poppins, Arial, sans-serif" font-size="48" font-weight="700">9,240</text>
  <text x="724" y="224" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="2">LEADS SCORED</text>
  <rect x="964" y="130" width="238" height="136" rx="24" fill="#0a0e1a" stroke="#1f2937" stroke-width="2"/>
  <text x="998" y="181" fill="#f59e0b" font-family="Poppins, Arial, sans-serif" font-size="48" font-weight="700">0.878</text>
  <text x="998" y="224" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="2">ROC-AUC</text>
  <rect x="1238" y="130" width="238" height="136" rx="24" fill="#0a0e1a" stroke="#1f2937" stroke-width="2"/>
  <text x="1272" y="181" fill="#f59e0b" font-family="Poppins, Arial, sans-serif" font-size="48" font-weight="700">~6x</text>
  <text x="1272" y="224" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="2">SEPARATION</text>
  <rect x="134" y="318" width="756" height="486" rx="30" fill="#0a0e1a" stroke="#1f2937" stroke-width="2"/>
  <text x="172" y="374" fill="#f3f4f6" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="600">Conversion Intelligence</text>
  <polyline points="186,710 282,652 378,674 474,558 570,600 666,452 794,404" fill="none" stroke="#60a5fa" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <polyline points="186,746 282,728 378,714 474,686 570,648 666,630 794,590" fill="none" stroke="#34d399" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".75"/>
  <g fill="#1f2937">
    <rect x="186" y="420" width="660" height="2"/>
    <rect x="186" y="510" width="660" height="2"/>
    <rect x="186" y="600" width="660" height="2"/>
    <rect x="186" y="690" width="660" height="2"/>
  </g>
  <rect x="948" y="318" width="476" height="486" rx="30" fill="#0a0e1a" stroke="#1f2937" stroke-width="2"/>
  <text x="988" y="374" fill="#f3f4f6" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="600">Lead Segments</text>
  <circle cx="1186" cy="570" r="142" fill="none" stroke="#1f2937" stroke-width="52"/>
  <circle cx="1186" cy="570" r="142" fill="none" stroke="#34d399" stroke-width="52" stroke-dasharray="340 892" transform="rotate(-90 1186 570)" stroke-linecap="round"/>
  <circle cx="1186" cy="570" r="142" fill="none" stroke="#60a5fa" stroke-width="52" stroke-dasharray="245 892" stroke-dashoffset="-350" transform="rotate(-90 1186 570)" stroke-linecap="round"/>
  <circle cx="1186" cy="570" r="142" fill="none" stroke="#f59e0b" stroke-width="52" stroke-dasharray="180 892" stroke-dashoffset="-610" transform="rotate(-90 1186 570)" stroke-linecap="round"/>
  <text x="1124" y="562" fill="#f3f4f6" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="700">Hot</text>
  <text x="1102" y="606" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Warm / Cold</text>
  <g font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">
    <circle cx="1010" cy="756" r="10" fill="#34d399"/><text x="1030" y="764" fill="#9ca3af">Hot leads</text>
    <circle cx="1168" cy="756" r="10" fill="#60a5fa"/><text x="1188" y="764" fill="#9ca3af">Warm</text>
    <circle cx="1306" cy="756" r="10" fill="#f59e0b"/><text x="1326" y="764" fill="#9ca3af">Cold</text>
  </g>
  <rect x="134" y="840" width="1280" height="36" rx="18" fill="#1f2937"/>
  <rect x="134" y="840" width="972" height="36" rx="18" fill="url(#blue)"/>
</svg>
